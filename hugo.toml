baseURL = "https://stacknoah.com/"
languageCode = "ko-kr"
defaultContentLanguage = "ko"
title = "Stacknoah"
theme = "PaperMod"

enableRobotsTXT = true
enableEmoji = true
buildDrafts = false
buildFuture = false
buildExpired = false

# content/ 밑 폴더(섹션)를 상단 메뉴에 자동 등록.
# → 새 섹션 폴더만 만들면 메뉴가 알아서 생김 (메뉴 수동 편집 불필요)
sectionPagesMenu = "main"

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[pagination]
  pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "onedark"

[params]
  env = "production"
  comments = true
  title = "Stacknoah"
  description = "보안을 공부하며 당위와 논리를 기록합니다."
  keywords = ["Security", "CTF", "Dreamhack", "WriteUp", "OSCP", "WhiteHat School", "Pentest", "Infosec"]
  author = "Jaewoo Song"
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  disableThemeToggle = false
  disableNextPrev = true


  # 홈 최근글 피드에 포함할 섹션. 새 섹션 추가 시 여기에 이름만 더하면 됨
  # (메뉴/홈카드는 자동, 이건 '최근글 피드'에만 영향)
  mainSections = ["why", "what", "writeup", "ai", "insights", "activity"]

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowToc = true
  TocOpen = false
  ShowRssButtonInSectionTermList = true

  [params.homeInfoParams]
    Title = "송재우"
    eyebrow = "SECURITY · CTF · OFFENSIVE SECURITY"
    Content = """
보안을 공부합니다.

당위와 논리를 기록합니다.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/stacknoah"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:shelter021@icloud.com"

  [params.giscus]
    repo = "stacknoah/stacknoah.github.io"
    repoId = "R_kgDOSxtdag"
    category = "Announcements"
    categoryId = "DIC_kwDOSxtdas4C-jQN"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 섹션 메뉴는 자동(sectionPagesMenu). 아래는 수동으로 더하는 고정 항목만.
[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 80
[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 90
[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 100
